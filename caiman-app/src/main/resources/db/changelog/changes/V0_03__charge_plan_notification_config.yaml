databaseChangeLog:
  - changeSet:
      id: 3-create-charge-plan-notification-config
      author: caiman
      changes:
        - createTable:
            tableName: charge_plan_notification_config
            remarks: >
              Defines notification rules per trigger type for a charge plan.
              Each plan can have up to 5 rows, one per trigger_type:
                INVOICE_CREATED  — fires once when a new invoice is generated.
                PENDING_REMINDER — fires repeatedly while invoice is SENT but not yet due.
                OVERDUE_REMINDER — fires repeatedly while invoice is OVERDUE.
                PAYMENT_APPROVED — fires once when a proof is approved.
                PAYMENT_REJECTED — fires once when a proof is rejected.
              PAYMENT_APPROVED and PAYMENT_REJECTED rows are inserted automatically
              on ChargePlan creation with notifications enabled.
              reminder_interval and reminder_unit are null for one-shot trigger types
              (INVOICE_CREATED, PAYMENT_APPROVED, PAYMENT_REJECTED).
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: charge_plan_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cpnc_charge_plan
                    references: charge_plan(id)
              - column:
                  name: trigger_type
                  type: varchar(50)
                  remarks: >
                    Type of event that triggers this notification. One of:
                    INVOICE_CREATED, PENDING_REMINDER, OVERDUE_REMINDER,
                    PAYMENT_APPROVED, PAYMENT_REJECTED.
                    Each charge_plan has at most one row per trigger_type.
                  constraints:
                    nullable: false
              - column:
                  name: reminder_interval
                  type: integer
                  remarks: >
                    How often to repeat this notification, in reminder_unit periods.
                    Null for one-shot types (INVOICE_CREATED, PAYMENT_APPROVED, PAYMENT_REJECTED).
                    Required for PENDING_REMINDER and OVERDUE_REMINDER.
                  constraints:
                    nullable: true
              - column:
                  name: reminder_unit
                  type: varchar(20)
                  remarks: >
                    Time unit for reminder_interval. One of: DAILY, WEEKLY, MONTHLY.
                    Null for one-shot types.
                  constraints:
                    nullable: true
              - column:
                  name: max_attempts
                  type: integer
                  remarks: >
                    Maximum dispatch attempts per outbox entry of this type.
                    Null means unlimited retries until the invoice is resolved.
                  constraints:
                    nullable: true
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    When false, notifications of this trigger_type are disabled for this plan.
                    Allows disabling a specific trigger type without deleting the config row.
                    Odin and inline enqueuers check this flag before enqueuing.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
