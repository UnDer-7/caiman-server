databaseChangeLog:
  - changeSet:
      id: 11-create-indexes
      author: caiman
      changes:

        - createIndex:
            indexName: idx_charge_plan_status
            tableName: charge_plan
            remarks: Odin filters plans by status = ACTIVE on every daily run.
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_cpnc_plan_trigger
            tableName: charge_plan_notification_config
            remarks: Lookup of notification config by plan and trigger type. Unique per plan.
            columns:
              - column:
                  name: charge_plan_id
              - column:
                  name: trigger_type

        - createIndex:
            indexName: idx_cpm_charge_plan_status
            tableName: charge_plan_member
            remarks: >
              Odin fetches active members per plan on each generation run.
              Also used for rotation order calculation.
            columns:
              - column:
                  name: charge_plan_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_cpm_debtor
            tableName: charge_plan_member
            remarks: Lookup of all plans a debtor belongs to (admin debtor detail view).
            columns:
              - column:
                  name: debtor_id

        - createIndex:
            indexName: idx_invoice_status_due_date
            tableName: invoice
            remarks: >
              Core index for Odin overdue detection:
              WHERE status IN ('SENT','PARTIALLY_PAID') AND due_date < now().
            columns:
              - column:
                  name: status
              - column:
                  name: due_date

        - createIndex:
            indexName: idx_invoice_charge_plan_member
            tableName: invoice
            remarks: >
              Lookup of all invoices for a given member.
              Used in member detail view and when cancelling invoices on member leave.
            columns:
              - column:
                  name: charge_plan_member_id

        - createIndex:
            indexName: idx_invoice_charge_plan
            tableName: invoice
            remarks: Lookup of all invoices for a given plan.
            columns:
              - column:
                  name: charge_plan_id

        - createIndex:
            indexName: idx_payment_invoice
            tableName: payment
            remarks: Lookup of all payments for an invoice. Used to sum amount_paid.
            columns:
              - column:
                  name: invoice_id

        - createIndex:
            indexName: idx_proof_upload_token
            tableName: payment_proof
            remarks: >
              High-priority lookup. The public upload endpoint validates the JWT token
              on every request. Must be fast.
            columns:
              - column:
                  name: upload_token

        - createIndex:
            indexName: idx_proof_invoice
            tableName: payment_proof
            remarks: Lookup of all proofs submitted for an invoice.
            columns:
              - column:
                  name: invoice_id

        - createIndex:
            indexName: idx_outbox_scheduled
            tableName: notification_outbox
            remarks: >
              Core index for Huginn dispatcher:
              WHERE status = 'SCHEDULED' AND scheduled_for <= now().
              Runs every minute.
            columns:
              - column:
                  name: status
              - column:
                  name: scheduled_for

        - createIndex:
            indexName: idx_outbox_invoice_trigger
            tableName: notification_outbox
            remarks: >
              Odin idempotency guard: checks whether a SCHEDULED or PROCESSING
              entry already exists for a given invoice and trigger_type
              before enqueuing a duplicate.
            columns:
              - column:
                  name: invoice_id
              - column:
                  name: trigger_type
              - column:
                  name: status

        - createIndex:
            indexName: idx_log_invoice
            tableName: notification_log
            remarks: Lookup of full notification history per invoice for admin view.
            columns:
              - column:
                  name: invoice_id
