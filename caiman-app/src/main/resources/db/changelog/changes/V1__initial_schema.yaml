databaseChangeLog:

  # ============================================================
  # DEBTOR
  # Represents a person who owes money in one or more charge plans.
  # ============================================================
  - changeSet:
      id: 1-create-debtor
      author: caiman
      changes:
        - createTable:
            tableName: debtor
            remarks: >
              Represents a person who owes money in one or more charge plans.
              A debtor can belong to multiple charge plans simultaneously.
              Deactivating a debtor (is_active = false) hides them from plan
              assignment UI but does not affect existing memberships or invoices.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  remarks: Full name of the debtor. Used in notifications and UI listings.
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: text
                  remarks: Free-text notes about this debtor. Internal use only.
                  constraints:
                    nullable: true
              - column:
                  name: notifications_enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    Master switch for notifications for this debtor.
                    Both this flag and charge_plan.notifications_enabled must be true
                    for any notification to be sent to this debtor.
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    Soft-delete flag. When false, the debtor is hidden from plan
                    membership assignment UI. Does not affect existing memberships,
                    invoices, or payments.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # CHARGE_PLAN
  # Defines a recurring or fixed-total billing arrangement.
  # Two types: ROTATING (one payer per cycle) and SPLIT (all pay each cycle).
  # Three proof validation modes: AI_AUTO, MANUAL, AI_ASSISTED.
  # ============================================================
  - changeSet:
      id: 2-create-charge-plan
      author: caiman
      changes:
        - createTable:
            tableName: charge_plan
            remarks: >
              Defines a billing arrangement between the admin and a group of debtors.
              ROTATING plans assign one payer per cycle in a rotating order.
              SPLIT plans charge all members each cycle.
              proof_validation_mode controls how uploaded payment proofs are processed:
                AI_AUTO     — AI decides automatically.
                MANUAL      — admin decides, no AI involved.
                AI_ASSISTED — AI analyzes, admin makes final decision.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  remarks: Human-readable name. Shown in UI and notification emails.
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
                  remarks: Optional longer description for internal reference.
                  constraints:
                    nullable: true
              - column:
                  name: type
                  type: varchar(50)
                  remarks: >
                    Billing type. One of: ROTATING, SPLIT.
                    ROTATING: one member is responsible per cycle, determined by rotation_order.
                    SPLIT: all active members are charged each cycle.
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Lifecycle status. One of: ACTIVE, PAUSED, FINISHED.
                    ACTIVE: scheduler processes this plan normally.
                    PAUSED: scheduler skips this plan entirely.
                    FINISHED: plan has ended, no further processing.
                  constraints:
                    nullable: false
              - column:
                  name: proof_validation_mode
                  type: varchar(50)
                  defaultValue: AI_AUTO
                  remarks: >
                    Controls how uploaded payment proofs are validated. One of:
                    AI_AUTO     — AI analyzes and makes the final decision automatically.
                                  APPROVED if isValid=true, REJECTED if isValid=false.
                    MANUAL      — No AI. Proof goes directly to admin review queue.
                    AI_ASSISTED — AI analyzes. If isValid=true routes to admin review.
                                  If isValid=false rejects automatically.
                  constraints:
                    nullable: false
              - column:
                  name: total_amount
                  type: decimal(15, 2)
                  remarks: >
                    For ROTATING: the full amount the responsible member pays per cycle.
                    For SPLIT: the total divided among all active members each cycle.
                  constraints:
                    nullable: false
              - column:
                  name: due_tolerance_days
                  type: integer
                  defaultValueNumeric: 5
                  remarks: >
                    Number of days after invoice generation date to set due_date.
                    Example: generated on June 1 with tolerance 5 means due_date = June 6.
                  constraints:
                    nullable: false
              - column:
                  name: cycle_interval
                  type: integer
                  remarks: >
                    Number of cycle_unit periods between invoice generations.
                    Used with cycle_unit and cycle_anchor_date to determine generation dates.
                    Example: cycle_interval=2, cycle_unit=WEEKLY means every 2 weeks.
                  constraints:
                    nullable: false
              - column:
                  name: cycle_unit
                  type: varchar(20)
                  remarks: "Time unit for the billing cycle. One of: DAILY, WEEKLY, MONTHLY."
                  constraints:
                    nullable: false
              - column:
                  name: cycle_anchor_date
                  type: date
                  remarks: >
                    Reference date used to calculate future invoice generation dates.
                    Example: anchor=2025-01-05, interval=1, unit=MONTHLY means invoices
                    are generated on the 5th of each month.
                  constraints:
                    nullable: false
              - column:
                  name: notifications_enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    Master switch for all notifications in this plan.
                    Both this flag and debtor.notifications_enabled must be true
                    for any notification to be sent.
                  constraints:
                    nullable: false
              - column:
                  name: notification_time
                  type: time
                  remarks: >
                    Time of day (in notification_timezone) at which notifications
                    should be dispatched. Combined with notification_timezone to
                    calculate the UTC scheduled_for timestamp in notification_outbox.
                  constraints:
                    nullable: false
              - column:
                  name: notification_timezone
                  type: varchar(100)
                  remarks: >
                    IANA timezone identifier used to interpret notification_time.
                    Example: "America/Sao_Paulo", "UTC".
                    All timestamps stored in the database are UTC. This field is only
                    used to convert notification_time to a UTC instant for scheduling.
                  constraints:
                    nullable: false
              - column:
                  name: starts_at
                  type: datetime
                  remarks: Datetime from which this plan is active. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: ends_at
                  type: datetime
                  remarks: >
                    Optional hard end date. When now() >= ends_at the scheduler sets
                    status = FINISHED. Null means no fixed end date.
                  constraints:
                    nullable: true
              - column:
                  name: end_when_recovered
                  type: decimal(15, 2)
                  remarks: >
                    Optional total amount to recover. When sum of all payments for this
                    plan >= end_when_recovered, scheduler sets status = FINISHED.
                    Intended for SPLIT plans with a fixed total (e.g. AirBnB trip).
                    Null means no recovery target.
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # CHARGE_PLAN_NOTIFICATION_CONFIG
  # Per-plan notification rules for each trigger type.
  # Up to 5 rows per plan (one per trigger_type).
  # On ChargePlan creation, PAYMENT_APPROVED and PAYMENT_REJECTED
  # rows are automatically inserted with notifications enabled.
  # ============================================================
  - changeSet:
      id: 3-create-charge-plan-notification-config
      author: caiman
      changes:
        - createTable:
            tableName: charge_plan_notification_config
            remarks: >
              Defines notification rules per trigger type for a charge plan.
              Each plan can have up to 5 rows, one per trigger_type:
                INVOICE_CREATED  — fires once when a new invoice is generated.
                PENDING_REMINDER — fires repeatedly while invoice is SENT but not yet due.
                OVERDUE_REMINDER — fires repeatedly while invoice is OVERDUE.
                PAYMENT_APPROVED — fires once when a proof is approved.
                PAYMENT_REJECTED — fires once when a proof is rejected.
              PAYMENT_APPROVED and PAYMENT_REJECTED rows are inserted automatically
              on ChargePlan creation with notifications enabled.
              reminder_interval and reminder_unit are null for one-shot trigger types
              (INVOICE_CREATED, PAYMENT_APPROVED, PAYMENT_REJECTED).
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: charge_plan_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cpnc_charge_plan
                    references: charge_plan(id)
              - column:
                  name: trigger_type
                  type: varchar(50)
                  remarks: >
                    Type of event that triggers this notification. One of:
                    INVOICE_CREATED, PENDING_REMINDER, OVERDUE_REMINDER,
                    PAYMENT_APPROVED, PAYMENT_REJECTED.
                    Each charge_plan has at most one row per trigger_type.
                  constraints:
                    nullable: false
              - column:
                  name: reminder_interval
                  type: integer
                  remarks: >
                    How often to repeat this notification, in reminder_unit periods.
                    Null for one-shot types (INVOICE_CREATED, PAYMENT_APPROVED, PAYMENT_REJECTED).
                    Required for PENDING_REMINDER and OVERDUE_REMINDER.
                  constraints:
                    nullable: true
              - column:
                  name: reminder_unit
                  type: varchar(20)
                  remarks: >
                    Time unit for reminder_interval. One of: DAILY, WEEKLY, MONTHLY.
                    Null for one-shot types.
                  constraints:
                    nullable: true
              - column:
                  name: max_attempts
                  type: integer
                  remarks: >
                    Maximum dispatch attempts per outbox entry of this type.
                    Null means unlimited retries until the invoice is resolved.
                  constraints:
                    nullable: true
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    When false, notifications of this trigger_type are disabled for this plan.
                    Allows disabling a specific trigger type without deleting the config row.
                    Odin and inline enqueuers check this flag before enqueuing.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # CHARGE_PLAN_MEMBER
  # Junction between a charge plan and a debtor.
  # ============================================================
  - changeSet:
      id: 4-create-charge-plan-member
      author: caiman
      changes:
        - createTable:
            tableName: charge_plan_member
            remarks: >
              Associates a debtor with a charge plan and holds per-member configuration.
              For ROTATING plans, rotation_order defines the sequence in which members
              are assigned as the responsible payer each cycle.
              For SPLIT plans, amount_override allows assigning a custom share.
              When a member leaves (left_at is set), they are excluded from future
              invoice generation. Historical invoices remain intact unless cancelled
              via the leave endpoint with cancelPendingInvoices=true.
              credit_balance holds pre-paid credit deducted from the next generated invoice.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: charge_plan_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cpm_charge_plan
                    references: charge_plan(id)
              - column:
                  name: debtor_id
                  type: varchar(36)
                  remarks: Foreign key to debtor.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cpm_debtor
                    references: debtor(id)
              - column:
                  name: amount_override
                  type: decimal(15, 2)
                  remarks: >
                    If set, this member pays this fixed amount instead of the plan default.
                    Useful for SPLIT plans with unequal shares. Null means use plan default.
                  constraints:
                    nullable: true
              - column:
                  name: rotation_order
                  type: integer
                  remarks: >
                    Position in the rotation sequence for ROTATING plans.
                    Scheduler determines responsible member using:
                    members ordered by rotation_order ASC [ cycle_index % total_active_members ].
                    Null for SPLIT plans. Must be unique within the plan for ROTATING plans.
                    Managed via the dedicated reorder endpoint — never auto-assigned.
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Membership status. One of: ACTIVE, LEFT.
                    ACTIVE: member is included in invoice generation.
                    LEFT: member has left the plan, excluded from new invoices.
                  constraints:
                    nullable: false
              - column:
                  name: credit_balance
                  type: decimal(15, 2)
                  defaultValueNumeric: "0.00"
                  remarks: >
                    Pre-paid credit balance. Deducted from amount_due when the next
                    invoice is generated for this member. Credited via admin endpoint.
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: datetime
                  remarks: Datetime when this membership became active. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: left_at
                  type: datetime
                  remarks: >
                    Datetime when this member left the plan. Null while active.
                    When set, scheduler excludes this member from future invoice generation.
                  constraints:
                    nullable: true

  # ============================================================
  # INVOICE
  # A single billing record for one member for one cycle.
  # ============================================================
  - changeSet:
      id: 5-create-invoice
      author: caiman
      changes:
        - createTable:
            tableName: invoice
            remarks: >
              Represents a single charge issued to one member for one billing cycle.
              Generated automatically by Odin (daily scheduler).
              Supports partial payments — amount_paid is the running sum of all
              linked payments. Status is derived from amount_paid vs amount_due
              and due_date. cycle_index is a monotonically increasing integer
              starting at 0 that identifies which cycle this invoice belongs to.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: charge_plan_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan. Denormalized for query convenience.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoice_charge_plan
                    references: charge_plan(id)
              - column:
                  name: charge_plan_member_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan_member. The member this invoice was issued to.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoice_charge_plan_member
                    references: charge_plan_member(id)
              - column:
                  name: cycle_index
                  type: integer
                  remarks: >
                    Zero-based index of the billing cycle that generated this invoice.
                    Used to reconstruct rotation history: responsible member =
                    members_ordered_by_rotation_order[cycle_index % total_active_members].
                  constraints:
                    nullable: false
              - column:
                  name: amount_due
                  type: decimal(15, 2)
                  remarks: >
                    Total amount the member must pay. Set at creation time, never changed.
                    Already reflects any credit_balance deduction applied at generation.
                  constraints:
                    nullable: false
              - column:
                  name: amount_paid
                  type: decimal(15, 2)
                  defaultValueNumeric: 0.00
                  remarks: >
                    Running total of all confirmed payments for this invoice.
                    Updated each time a Payment is approved.
                    When amount_paid >= amount_due, status transitions to PAID.
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Current state of this invoice. One of:
                    PENDING        — generated, notification not yet sent.
                    SENT           — notification email sent, awaiting payment.
                    OVERDUE        — due_date passed without full payment.
                    PARTIALLY_PAID — at least one payment received but amount_paid < amount_due.
                    PAID           — amount_paid >= amount_due. Terminal state.
                    CANCELLED      — manually cancelled by admin. Terminal state.
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: datetime
                  remarks: >
                    Deadline for payment. Calculated at creation as:
                    generation_date + charge_plan.due_tolerance_days.
                    When now() > due_date and invoice is not PAID, Odin sets OVERDUE.
                    Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: cancellation_reason
                  type: varchar(500)
                  remarks: >
                    Human-readable reason for cancellation. Set when admin cancels
                    or when a member leaves with cancelPendingInvoices=true.
                    Null for non-cancelled invoices.
                  constraints:
                    nullable: true
              - column:
                  name: cancelled_at
                  type: datetime
                  remarks: >
                    Datetime when this invoice was cancelled. Null for non-cancelled invoices.
                    Always stored in UTC.
                  constraints:
                    nullable: true
              - column:
                  name: paid_at
                  type: datetime
                  remarks: >
                    Datetime when the invoice reached PAID status.
                    Set when amount_paid >= amount_due. Null until fully paid.
                    Always stored in UTC.
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # PAYMENT_PROOF
  # An uploaded receipt submitted by a debtor via a tokenized link.
  # Processing depends on charge_plan.proof_validation_mode.
  # Must be created before PAYMENT (payment has FK to payment_proof).
  # ============================================================
  - changeSet:
      id: 7-create-payment-proof
      author: caiman
      changes:
        - createTable:
            tableName: payment_proof
            remarks: >
              Stores a payment receipt uploaded by a debtor through the public
              tokenized link included in the invoice notification email.
              Processing flow depends on charge_plan.proof_validation_mode:

              AI_AUTO:
                Upload -> PENDING_ANALYSIS -> AI analyzes ->
                  isValid=true  -> APPROVED  -> Payment created -> PAYMENT_APPROVED notification
                  isValid=false -> REJECTED               -> PAYMENT_REJECTED notification
                  AI fails      -> PENDING_MANUAL_REVIEW  -> admin decides

              MANUAL:
                Upload -> PENDING_MANUAL_REVIEW -> admin decides ->
                  APPROVED -> Payment created -> PAYMENT_APPROVED notification
                  REJECTED                   -> PAYMENT_REJECTED notification

              AI_ASSISTED:
                Upload -> PENDING_ANALYSIS -> AI analyzes ->
                  isValid=true  -> PENDING_MANUAL_REVIEW -> admin decides ->
                                     APPROVED -> Payment created -> PAYMENT_APPROVED notification
                                     REJECTED               -> PAYMENT_REJECTED notification
                  isValid=false -> REJECTED               -> PAYMENT_REJECTED notification
                  AI fails      -> PENDING_MANUAL_REVIEW  -> admin decides

              The upload endpoint returns 202 immediately. All processing is async.
              ai_raw_response stores the full AI response for audit purposes.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: Foreign key to invoice.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_proof_invoice
                    references: invoice(id)
              - column:
                  name: file_path
                  type: varchar(1000)
                  remarks: >
                    Relative path to the uploaded proof file in the configured storage
                    directory. File is retained for audit even after rejection.
                  constraints:
                    nullable: false
              - column:
                  name: upload_token
                  type: varchar(500)
                  remarks: >
                    Short-lived JWT token that authorized the upload. Stored for audit.
                    Generated when the invoice notification email is sent.
                    A new token is issued when admin resends the notification link.
                  constraints:
                    nullable: false
              - column:
                  name: token_expires_at
                  type: datetime
                  remarks: >
                    Expiry datetime of the upload_token. Requests after this datetime
                    are rejected with 401. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: ai_extracted_value
                  type: decimal(15, 2)
                  remarks: >
                    Payment amount extracted from the proof by the AI model.
                    Null for MANUAL mode or until AI analysis completes.
                  constraints:
                    nullable: true
              - column:
                  name: final_value
                  type: decimal(15, 2)
                  remarks: >
                    The amount used when creating the Payment record.
                    Set from ai_extracted_value (AI_AUTO, AI_ASSISTED) or
                    from admin input during manual review (MANUAL, AI_ASSISTED).
                    Null until proof is approved.
                  constraints:
                    nullable: true
              - column:
                  name: requires_manual_review
                  type: boolean
                  defaultValueBoolean: false
                  remarks: >
                    True when this proof requires or required admin attention:
                    MANUAL mode (always), AI_ASSISTED with isValid=true, or AI failure.
                  constraints:
                    nullable: false
              - column:
                  name: ai_raw_response
                  type: text
                  remarks: >
                    Full raw JSON response from the AI model stored for audit.
                    Includes all fields: isValid, valueReceived, paymentDate,
                    receiverName, method, rejectionReason.
                    Null for MANUAL mode or until AI analysis runs.
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Processing status of this proof. One of:
                    PENDING_ANALYSIS     — uploaded, AI analysis not yet complete.
                                          Only for AI_AUTO and AI_ASSISTED modes.
                    PENDING_MANUAL_REVIEW — awaiting admin decision. Applies to:
                                          MANUAL (always), AI_ASSISTED (isValid=true),
                                          AI failure (any mode).
                    APPROVED             — proof accepted, payment record created.
                    REJECTED             — proof rejected. No payment created.
                                          Debtor can re-upload.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when the proof was uploaded. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # PAYMENT
  # A confirmed payment event linked to an invoice.
  # Multiple payments per invoice supported (partial payments).
  # ============================================================
  - changeSet:
      id: 6-create-payment
      author: caiman
      changes:
        - createTable:
            tableName: payment
            remarks: >
              Records a single confirmed payment against an invoice.
              An invoice can have multiple payments (partial payment support).
              Payments originate from two sources:
                1. Approved payment_proof: payment_proof_id is set, approved_manually=false.
                2. Manual admin entry: payment_proof_id is null, approved_manually=true.
              Manual payments (admin-initiated) do not trigger PAYMENT_APPROVED notifications.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: Foreign key to invoice.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_invoice
                    references: invoice(id)
              - column:
                  name: payment_proof_id
                  type: varchar(36)
                  remarks: >
                    Foreign key to payment_proof. Null when registered manually by admin
                    without an uploaded proof.
                  constraints:
                    nullable: true
                    foreignKeyName: fk_payment_payment_proof
                    references: payment_proof(id)
              - column:
                  name: amount
                  type: decimal(15, 2)
                  remarks: >
                    Amount confirmed as paid in this payment event.
                    For proof-based payments: payment_proof.final_value.
                    For manual payments: amount entered by admin.
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: varchar(50)
                  remarks: >
                    Payment method. One of: PIX, BANK_TRANSFER, CASH, VENMO, OTHER.
                    Null when method could not be determined or was not provided.
                  constraints:
                    nullable: true
              - column:
                  name: approved_manually
                  type: boolean
                  defaultValueBoolean: false
                  remarks: >
                    True when registered directly by admin without proof upload flow.
                    False when originating from an approved payment_proof.
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: datetime
                  remarks: >
                    Datetime the payment actually occurred. May differ from created_at.
                    For proof-based: extracted by AI. For manual: entered by admin.
                    Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this payment record was created. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # NOTIFICATION_OUTBOX
  # Transactional outbox — work queue for pending notifications.
  # Written by Odin (daily scheduler) and inline on proof resolution.
  # Read and dispatched by Huginn (minutely dispatcher).
  # Rows are DELETED on terminal state (sent or exhausted).
  # History is preserved in notification_log.
  # ============================================================
  - changeSet:
      id: 8-create-notification-outbox
      author: caiman
      changes:
        - createTable:
            tableName: notification_outbox
            remarks: >
              Transactional outbox — work queue for pending notification dispatch.
              Odin writes invoice-related notifications (INVOICE_CREATED, PENDING_REMINDER,
              OVERDUE_REMINDER) within the same DB transaction as invoice generation.
              PAYMENT_APPROVED and PAYMENT_REJECTED are enqueued inline at proof resolution
              time with scheduled_for = NOW(), not by Odin.
              Huginn reads SCHEDULED entries where scheduled_for <= now(), dispatches,
              and DELETES the row on success or exhaustion.
              Only in-flight rows exist here (SCHEDULED, PROCESSING, FAILED).
              All history is in notification_log (append-only, never deleted).
              payload is a JSON snapshot of all data needed to render the email,
              captured at enqueue time to avoid stale reads during dispatch.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: Foreign key to invoice. The invoice this notification is about.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_outbox_invoice
                    references: invoice(id)
              - column:
                  name: trigger_type
                  type: varchar(50)
                  remarks: >
                    The event that caused this notification to be enqueued. One of:
                    INVOICE_CREATED  — new invoice generated, enqueued by Odin.
                    PENDING_REMINDER — invoice not yet due, enqueued by Odin.
                    OVERDUE_REMINDER — invoice overdue, enqueued by Odin.
                    PAYMENT_APPROVED — proof approved, enqueued inline at resolution.
                    PAYMENT_REJECTED — proof rejected, enqueued inline at resolution.
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: varchar(50)
                  remarks: "Delivery channel. Currently always EMAIL. Future: TELEGRAM, SMS."
                  constraints:
                    nullable: false
              - column:
                  name: recipient
                  type: varchar(255)
                  remarks: Channel-specific recipient address (email address for EMAIL channel).
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: text
                  remarks: >
                    JSON snapshot of all data needed to render and send the notification
                    without additional DB queries at dispatch time.
                    Captured at enqueue time. Includes: debtor name, plan name,
                    invoice amount, due date, upload link (with JWT token), cycle index,
                    and for payment result notifications: the outcome and rejection reason.
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_for
                  type: datetime
                  remarks: >
                    UTC datetime at which this notification should be dispatched.
                    For Odin-scheduled: today + notification_time converted to UTC.
                    For payment results: NOW() at time of proof resolution.
                    Huginn only picks up entries where scheduled_for <= now().
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Processing status. One of:
                    SCHEDULED  — waiting to be dispatched or rescheduled after failure.
                    PROCESSING — currently being dispatched by Huginn (concurrency lock).
                    FAILED     — last attempt failed, will retry (attempt_count < max_attempts).
                    Rows are DELETED when reaching terminal state (sent or exhausted).
                    SENT and EXHAUSTED states do not persist here — see notification_log.
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: integer
                  defaultValueNumeric: 0
                  remarks: >
                    Number of dispatch attempts made so far. Incremented on each failure.
                    When attempt_count reaches max_attempts, row is deleted and a FAILED
                    entry is inserted in notification_log.
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: integer
                  remarks: >
                    Maximum allowed dispatch attempts. Copied from
                    charge_plan_notification_config.max_attempts at enqueue time
                    so config changes do not affect in-flight entries.
                  constraints:
                    nullable: false
              - column:
                  name: last_attempted_at
                  type: datetime
                  remarks: >
                    Datetime of the most recent dispatch attempt. Null before first attempt.
                    Used to compute exponential backoff for next scheduled_for on failure.
                    Also used to detect stuck PROCESSING entries (older than 5 minutes).
                    Always stored in UTC.
                  constraints:
                    nullable: true
              - column:
                  name: last_error
                  type: text
                  remarks: >
                    Error message from the last failed dispatch attempt. Null on no failure.
                    Overwritten on each failure. Retained until row is deleted.
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this outbox entry was created. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # NOTIFICATION_LOG
  # Immutable audit log of all notification dispatch attempts.
  # Append-only. Written by Huginn after each attempt.
  # Never deleted. notification_outbox rows are deleted after
  # terminal state; this table is the permanent record.
  # ============================================================
  - changeSet:
      id: 9-create-notification-log
      author: caiman
      changes:
        - createTable:
            tableName: notification_log
            remarks: >
              Immutable audit log of every notification dispatch attempt.
              Written by Huginn after each send attempt (success or failure).
              Append-only — never updated after insertion, never deleted.
              notification_outbox rows are deleted on terminal state;
              this table is the permanent historical record.
              No business logic reads from this table — it is for admin
              visibility and debugging only.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: >
                    Foreign key to invoice. Denormalized from outbox for direct
                    querying of notification history per invoice.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_log_invoice
                    references: invoice(id)
              - column:
                  name: outbox_id
                  type: varchar(36)
                  remarks: >
                    ID of the outbox entry that originated this log entry.
                    Stored as plain varchar (not FK) because the outbox row is
                    deleted after processing — referential integrity not enforced.
                  constraints:
                    nullable: false
              - column:
                  name: trigger_type
                  type: varchar(50)
                  remarks: >
                    Copied from notification_outbox.trigger_type at log time.
                    One of: INVOICE_CREATED, PENDING_REMINDER, OVERDUE_REMINDER,
                    PAYMENT_APPROVED, PAYMENT_REJECTED.
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: varchar(50)
                  remarks: Copied from notification_outbox.channel at log time.
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: "Result of this dispatch attempt. One of: SENT, FAILED."
                  constraints:
                    nullable: false
              - column:
                  name: recipient
                  type: varchar(255)
                  remarks: The actual recipient address used for this dispatch attempt.
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
                  remarks: Error detail when status = FAILED. Null on success.
                  constraints:
                    nullable: true
              - column:
                  name: sent_at
                  type: datetime
                  remarks: Datetime of this dispatch attempt. Always stored in UTC.
                  constraints:
                    nullable: false

  # ============================================================
  # DEBTOR_CONTACT
  # Contact endpoints for a debtor, keyed by channel type.
  # Replaces the flat email/phone/telegram_handle columns on debtor.
  # ============================================================
  - changeSet:
      id: 10-create-debtor-contact
      author: caiman
      changes:
        - createTable:
            tableName: debtor_contact
            remarks: >
              Stores contact endpoints for a debtor, keyed by channel type.
              Each row is an independent contact entry — a debtor may have
              multiple entries per contact_type (e.g. two email addresses).
              priority orders entries within the same type: lower value = higher
              priority. 1 is the primary contact. Huginn resolves the recipient
              address by selecting the lowest-priority entry for the target channel.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: debtor_id
                  type: varchar(36)
                  remarks: Foreign key to debtor.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dc_debtor
                    references: debtor(id)
              - column:
                  name: contact_type
                  type: varchar(50)
                  remarks: >
                    Channel type. One of: EMAIL, MOBILE_PHONE, WHATSAPP, TELEGRAM.
                    EMAIL        — standard SMTP address (e.g. user@example.com).
                    MOBILE_PHONE — E.164 phone number (e.g. +5561986823666).
                    WHATSAPP     — E.164 number; JID is built by the integration adapter.
                    TELEGRAM     — username without @ or E.164 phone number.
                  constraints:
                    nullable: false
              - column:
                  name: contact_value
                  type: varchar(500)
                  remarks: >
                    The actual contact address for the given contact_type.
                    EMAIL        — standard email address.
                    MOBILE_PHONE — E.164 (e.g. +5561986823666).
                    WHATSAPP     — E.164 number; integration adapter constructs the JID.
                    TELEGRAM     — username (without @) or E.164 phone number.
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: integer
                  defaultValueNumeric: "1"
                  remarks: >
                    Dispatch priority within the same (debtor_id, contact_type) group.
                    Lower value = higher priority. 1 is the primary contact.
                    Huginn picks the entry with the lowest priority when routing.
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: debtor_contact
            columnNames: debtor_id, contact_type, contact_value
            constraintName: uq_dc_debtor_type_value

  # ============================================================
  # INDEXES
  # ============================================================
  - changeSet:
      id: 11-create-indexes
      author: caiman
      changes:

        - createIndex:
            indexName: idx_debtor_is_active
            tableName: debtor
            remarks: Filters active debtors in plan membership assignment UI.
            columns:
              - column:
                  name: is_active

        - createIndex:
            indexName: idx_dc_debtor_type
            tableName: debtor_contact
            remarks: >
              Core lookup for Huginn: resolve contact address by debtor and channel type.
              Also used by admin UI to list contacts per debtor filtered by type.
            columns:
              - column:
                  name: debtor_id
              - column:
                  name: contact_type

        - createIndex:
            indexName: idx_dc_debtor
            tableName: debtor_contact
            remarks: Fetch all contacts for a debtor (admin debtor detail view).
            columns:
              - column:
                  name: debtor_id

        - createIndex:
            indexName: idx_charge_plan_status
            tableName: charge_plan
            remarks: Odin filters plans by status = ACTIVE on every daily run.
            columns:
              - column:
                  name: status

        - createIndex:
            indexName: idx_cpnc_plan_trigger
            tableName: charge_plan_notification_config
            remarks: Lookup of notification config by plan and trigger type. Unique per plan.
            columns:
              - column:
                  name: charge_plan_id
              - column:
                  name: trigger_type

        - createIndex:
            indexName: idx_cpm_charge_plan_status
            tableName: charge_plan_member
            remarks: >
              Odin fetches active members per plan on each generation run.
              Also used for rotation order calculation.
            columns:
              - column:
                  name: charge_plan_id
              - column:
                  name: status

        - createIndex:
            indexName: idx_cpm_debtor
            tableName: charge_plan_member
            remarks: Lookup of all plans a debtor belongs to (admin debtor detail view).
            columns:
              - column:
                  name: debtor_id

        - createIndex:
            indexName: idx_invoice_status_due_date
            tableName: invoice
            remarks: >
              Core index for Odin overdue detection:
              WHERE status IN ('SENT','PARTIALLY_PAID') AND due_date < now().
            columns:
              - column:
                  name: status
              - column:
                  name: due_date

        - createIndex:
            indexName: idx_invoice_charge_plan_member
            tableName: invoice
            remarks: >
              Lookup of all invoices for a given member.
              Used in member detail view and when cancelling invoices on member leave.
            columns:
              - column:
                  name: charge_plan_member_id

        - createIndex:
            indexName: idx_invoice_charge_plan
            tableName: invoice
            remarks: Lookup of all invoices for a given plan.
            columns:
              - column:
                  name: charge_plan_id

        - createIndex:
            indexName: idx_payment_invoice
            tableName: payment
            remarks: Lookup of all payments for an invoice. Used to sum amount_paid.
            columns:
              - column:
                  name: invoice_id

        - createIndex:
            indexName: idx_proof_upload_token
            tableName: payment_proof
            remarks: >
              High-priority lookup. The public upload endpoint validates the JWT token
              on every request. Must be fast.
            columns:
              - column:
                  name: upload_token

        - createIndex:
            indexName: idx_proof_invoice
            tableName: payment_proof
            remarks: Lookup of all proofs submitted for an invoice.
            columns:
              - column:
                  name: invoice_id

        - createIndex:
            indexName: idx_outbox_scheduled
            tableName: notification_outbox
            remarks: >
              Core index for Huginn dispatcher:
              WHERE status = 'SCHEDULED' AND scheduled_for <= now().
              Runs every minute.
            columns:
              - column:
                  name: status
              - column:
                  name: scheduled_for

        - createIndex:
            indexName: idx_outbox_invoice_trigger
            tableName: notification_outbox
            remarks: >
              Odin idempotency guard: checks whether a SCHEDULED or PROCESSING
              entry already exists for a given invoice and trigger_type
              before enqueuing a duplicate.
            columns:
              - column:
                  name: invoice_id
              - column:
                  name: trigger_type
              - column:
                  name: status

        - createIndex:
            indexName: idx_log_invoice
            tableName: notification_log
            remarks: Lookup of full notification history per invoice for admin view.
            columns:
              - column:
                  name: invoice_id
