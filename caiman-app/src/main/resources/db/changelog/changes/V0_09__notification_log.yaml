databaseChangeLog:
  - changeSet:
      id: 9-create-notification-log
      author: caiman
      changes:
        - createTable:
            tableName: notification_log
            remarks: >
              Immutable audit log of every notification dispatch attempt.
              Written by Huginn after each send attempt (success or failure).
              Append-only — never updated after insertion, never deleted.
              notification_outbox rows are deleted on terminal state;
              this table is the permanent historical record.
              No business logic reads from this table — it is for admin
              visibility and debugging only.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: >
                    Foreign key to invoice. Denormalized from outbox for direct
                    querying of notification history per invoice.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_log_invoice
                    references: invoice(id)
              - column:
                  name: outbox_id
                  type: varchar(36)
                  remarks: >
                    ID of the outbox entry that originated this log entry.
                    Stored as plain varchar (not FK) because the outbox row is
                    deleted after processing — referential integrity not enforced.
                  constraints:
                    nullable: false
              - column:
                  name: trigger_type
                  type: varchar(50)
                  remarks: >
                    Copied from notification_outbox.trigger_type at log time.
                    One of: INVOICE_CREATED, PENDING_REMINDER, OVERDUE_REMINDER,
                    PAYMENT_APPROVED, PAYMENT_REJECTED.
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: varchar(50)
                  remarks: Copied from notification_outbox.channel at log time.
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: "Result of this dispatch attempt. One of: SENT, FAILED."
                  constraints:
                    nullable: false
              - column:
                  name: recipient
                  type: varchar(255)
                  remarks: The actual recipient address used for this dispatch attempt.
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: text
                  remarks: Error detail when status = FAILED. Null on success.
                  constraints:
                    nullable: true
              - column:
                  name: sent_at
                  type: datetime
                  remarks: Datetime of this dispatch attempt. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
