databaseChangeLog:
  - changeSet:
      id: 6-create-payment
      author: caiman
      changes:
        - createTable:
            tableName: payment
            remarks: >
              Records a single confirmed payment against an invoice.
              An invoice can have multiple payments (partial payment support).
              Payments originate from two sources:
                1. Approved payment_proof: payment_proof_id is set, approved_manually=false.
                2. Manual admin entry: payment_proof_id is null, approved_manually=true.
              Manual payments (admin-initiated) do not trigger PAYMENT_APPROVED notifications.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: Foreign key to invoice.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payment_invoice
                    references: invoice(id)
              - column:
                  name: payment_proof_id
                  type: varchar(36)
                  remarks: >
                    Foreign key to payment_proof. Null when registered manually by admin
                    without an uploaded proof.
                  constraints:
                    nullable: true
                    foreignKeyName: fk_payment_payment_proof
                    references: payment_proof(id)
              - column:
                  name: amount
                  type: decimal(15, 2)
                  remarks: >
                    Amount confirmed as paid in this payment event.
                    For proof-based payments: payment_proof.final_value.
                    For manual payments: amount entered by admin.
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: varchar(50)
                  remarks: >
                    Payment method. One of: PIX, BANK_TRANSFER, CASH, VENMO, OTHER.
                    Null when method could not be determined or was not provided.
                  constraints:
                    nullable: true
              - column:
                  name: approved_manually
                  type: boolean
                  defaultValueBoolean: false
                  remarks: >
                    True when registered directly by admin without proof upload flow.
                    False when originating from an approved payment_proof.
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: datetime
                  remarks: >
                    Datetime the payment actually occurred. May differ from created_at.
                    For proof-based: extracted by AI. For manual: entered by admin.
                    Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this payment record was created. Always stored in UTC.
                  constraints:
                    nullable: false
