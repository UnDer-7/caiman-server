databaseChangeLog:
  - changeSet:
      id: 5-create-invoice
      author: caiman
      changes:
        - createTable:
            tableName: invoice
            remarks: >
              Represents a single charge issued to one member for one billing cycle.
              Generated automatically by Odin (daily scheduler).
              Supports partial payments — amount_paid is the running sum of all
              linked payments. Status is derived from amount_paid vs amount_due
              and due_date. cycle_index is a monotonically increasing integer
              starting at 0 that identifies which cycle this invoice belongs to.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: charge_plan_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan. Denormalized for query convenience.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoice_charge_plan
                    references: charge_plan(id)
              - column:
                  name: charge_plan_member_id
                  type: varchar(36)
                  remarks: Foreign key to charge_plan_member. The member this invoice was issued to.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_invoice_charge_plan_member
                    references: charge_plan_member(id)
              - column:
                  name: cycle_index
                  type: integer
                  remarks: >
                    Zero-based index of the billing cycle that generated this invoice.
                    Used to reconstruct rotation history: responsible member =
                    members_ordered_by_rotation_order[cycle_index % total_active_members].
                  constraints:
                    nullable: false
              - column:
                  name: amount_due
                  type: decimal(15, 2)
                  remarks: >
                    Total amount the member must pay. Set at creation time, never changed.
                    Already reflects any credit_balance deduction applied at generation.
                  constraints:
                    nullable: false
              - column:
                  name: amount_paid
                  type: decimal(15, 2)
                  defaultValueNumeric: "0.00"
                  remarks: >
                    Running total of all confirmed payments for this invoice.
                    Updated each time a Payment is approved.
                    When amount_paid >= amount_due, status transitions to PAID.
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Current state of this invoice. One of:
                    PENDING        — generated, notification not yet sent.
                    SENT           — notification email sent, awaiting payment.
                    OVERDUE        — due_date passed without full payment.
                    PARTIALLY_PAID — at least one payment received but amount_paid < amount_due.
                    PAID           — amount_paid >= amount_due. Terminal state.
                    CANCELLED      — manually cancelled by admin. Terminal state.
                  constraints:
                    nullable: false
              - column:
                  name: due_date
                  type: datetime
                  remarks: >
                    Deadline for payment. Calculated at creation as:
                    generation_date + charge_plan.due_tolerance_days.
                    When now() > due_date and invoice is not PAID, Odin sets OVERDUE.
                    Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: cancellation_reason
                  type: varchar(500)
                  remarks: >
                    Human-readable reason for cancellation. Set when admin cancels
                    or when a member leaves with cancelPendingInvoices=true.
                    Null for non-cancelled invoices.
                  constraints:
                    nullable: true
              - column:
                  name: cancelled_at
                  type: datetime
                  remarks: >
                    Datetime when this invoice was cancelled. Null for non-cancelled invoices.
                    Always stored in UTC.
                  constraints:
                    nullable: true
              - column:
                  name: paid_at
                  type: datetime
                  remarks: >
                    Datetime when the invoice reached PAID status.
                    Set when amount_paid >= amount_due. Null until fully paid.
                    Always stored in UTC.
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
