databaseChangeLog:
  - changeSet:
      id: 1-create-debtor
      author: caiman
      changes:
        - createTable:
            tableName: debtor
            remarks: >
              Represents a person who owes money in one or more charge plans.
              A debtor can belong to multiple charge plans simultaneously.
              Deactivating a debtor (is_active = false) hides them from plan
              assignment UI but does not affect existing memberships or invoices.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  remarks: Full name of the debtor. Used in notifications and UI listings.
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: text
                  remarks: Free-text notes about this debtor. Internal use only.
                  constraints:
                    nullable: true
              - column:
                  name: notifications_enabled
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    Master switch for notifications for this debtor.
                    Both this flag and charge_plan.notifications_enabled must be true
                    for any notification to be sent to this debtor.
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
                  remarks: >
                    Soft-delete flag. When false, the debtor is hidden from plan
                    membership assignment UI. Does not affect existing memberships,
                    invoices, or payments.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
