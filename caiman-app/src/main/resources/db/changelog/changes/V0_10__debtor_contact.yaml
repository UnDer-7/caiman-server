databaseChangeLog:
  - changeSet:
      id: 10-create-debtor-contact
      author: caiman
      changes:
        - createTable:
            tableName: debtor_contact
            remarks: >
              Stores contact endpoints for a debtor, keyed by channel type.
              Each row is an independent contact entry — a debtor may have
              multiple entries per contact_type (e.g. two email addresses).
              priority orders entries within the same type: lower value = higher
              priority. 1 is the primary contact. Huginn resolves the recipient
              address by selecting the lowest-priority entry for the target channel.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: debtor_id
                  type: varchar(36)
                  remarks: Foreign key to debtor.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_dc_debtor
                    references: debtor(id)
              - column:
                  name: contact_type
                  type: varchar(50)
                  remarks: >
                    Channel type. One of: EMAIL, MOBILE_PHONE, WHATSAPP, TELEGRAM.
                    EMAIL        — standard SMTP address (e.g. user@example.com).
                    MOBILE_PHONE — E.164 phone number (e.g. +5561986823666).
                    WHATSAPP     — E.164 number; JID is built by the integration adapter.
                    TELEGRAM     — username without @ or E.164 phone number.
                  constraints:
                    nullable: false
              - column:
                  name: contact_value
                  type: varchar(500)
                  remarks: >
                    The actual contact address for the given contact_type.
                    EMAIL        — standard email address.
                    MOBILE_PHONE — E.164 (e.g. +5561986823666).
                    WHATSAPP     — E.164 number; integration adapter constructs the JID.
                    TELEGRAM     — username (without @) or E.164 phone number.
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: integer
                  defaultValueNumeric: "1"
                  remarks: >
                    Dispatch priority within the same (debtor_id, contact_type) group.
                    Lower value = higher priority. 1 is the primary contact.
                    Huginn picks the entry with the lowest priority when routing.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this record was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: debtor_contact
            columnNames: debtor_id, contact_type, contact_value
            constraintName: uq_dc_debtor_type_value

        - addUniqueConstraint:
            tableName: debtor_contact
            columnNames: debtor_id, contact_type, priority
            constraintName: uq_dc_debtor_type_priority
