databaseChangeLog:
  - changeSet:
      id: 8-create-notification-outbox
      author: caiman
      changes:
        - createTable:
            tableName: notification_outbox
            remarks: >
              Transactional outbox — work queue for pending notification dispatch.
              Odin writes invoice-related notifications (INVOICE_CREATED, PENDING_REMINDER,
              OVERDUE_REMINDER) within the same DB transaction as invoice generation.
              PAYMENT_APPROVED and PAYMENT_REJECTED are enqueued inline at proof resolution
              time with scheduled_for = NOW(), not by Odin.
              Huginn reads SCHEDULED entries where scheduled_for <= now(), dispatches,
              and DELETES the row on success or exhaustion.
              Only in-flight rows exist here (SCHEDULED, PROCESSING, FAILED).
              All history is in notification_log (append-only, never deleted).
              payload is a JSON snapshot of all data needed to render the email,
              captured at enqueue time to avoid stale reads during dispatch.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: Foreign key to invoice. The invoice this notification is about.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_outbox_invoice
                    references: invoice(id)
              - column:
                  name: trigger_type
                  type: varchar(50)
                  remarks: >
                    The event that caused this notification to be enqueued. One of:
                    INVOICE_CREATED  — new invoice generated, enqueued by Odin.
                    PENDING_REMINDER — invoice not yet due, enqueued by Odin.
                    OVERDUE_REMINDER — invoice overdue, enqueued by Odin.
                    PAYMENT_APPROVED — proof approved, enqueued inline at resolution.
                    PAYMENT_REJECTED — proof rejected, enqueued inline at resolution.
                  constraints:
                    nullable: false
              - column:
                  name: channel
                  type: varchar(50)
                  remarks: "Delivery channel. Currently always EMAIL."
                  constraints:
                    nullable: false
              - column:
                  name: recipient
                  type: varchar(255)
                  remarks: Channel-specific recipient address (email address for EMAIL channel).
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: text
                  remarks: >
                    JSON snapshot of all data needed to render and send the notification
                    without additional DB queries at dispatch time.
                    Captured at enqueue time. Includes: debtor name, plan name,
                    invoice amount, due date, upload link (with JWT token), cycle index,
                    and for payment result notifications: the outcome and rejection reason.
                  constraints:
                    nullable: false
              - column:
                  name: scheduled_for
                  type: datetime
                  remarks: >
                    UTC datetime at which this notification should be dispatched.
                    For Odin-scheduled: today + notification_time converted to UTC.
                    For payment results: NOW() at time of proof resolution.
                    Huginn only picks up entries where scheduled_for <= now().
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Processing status. One of:
                    SCHEDULED  — waiting to be dispatched or rescheduled after failure.
                    PROCESSING — currently being dispatched by Huginn (concurrency lock).
                    FAILED     — last attempt failed, will retry (attempt_count < max_attempts).
                    Rows are DELETED when reaching terminal state (sent or exhausted).
                    SENT and EXHAUSTED states do not persist here — see notification_log.
                  constraints:
                    nullable: false
              - column:
                  name: attempt_count
                  type: integer
                  defaultValueNumeric: "0"
                  remarks: >
                    Number of dispatch attempts made so far. Incremented on each failure.
                    When attempt_count reaches max_attempts, row is deleted and a FAILED
                    entry is inserted in notification_log.
                  constraints:
                    nullable: false
              - column:
                  name: max_attempts
                  type: integer
                  remarks: >
                    Maximum allowed dispatch attempts. Copied from
                    charge_plan_notification_config.max_attempts at enqueue time
                    so config changes do not affect in-flight entries.
                  constraints:
                    nullable: false
              - column:
                  name: last_attempted_at
                  type: datetime
                  remarks: >
                    Datetime of the most recent dispatch attempt. Null before first attempt.
                    Used to compute exponential backoff for next scheduled_for on failure.
                    Also used to detect stuck PROCESSING entries (older than 5 minutes).
                    Always stored in UTC.
                  constraints:
                    nullable: true
              - column:
                  name: last_error
                  type: text
                  remarks: >
                    Error message from the last failed dispatch attempt. Null on no failure.
                    Overwritten on each failure. Retained until row is deleted.
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when this outbox entry was created. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
