databaseChangeLog:
  - changeSet:
      id: 7-create-payment-proof
      author: caiman
      changes:
        - createTable:
            tableName: payment_proof
            remarks: >
              Stores a payment receipt uploaded by a debtor through the public
              tokenized link included in the invoice notification email.
              Processing flow depends on charge_plan.proof_validation_mode:

              AI_AUTO:
                Upload -> PENDING_ANALYSIS -> AI analyzes ->
                  isValid=true  -> APPROVED  -> Payment created -> PAYMENT_APPROVED notification
                  isValid=false -> REJECTED               -> PAYMENT_REJECTED notification
                  AI fails      -> PENDING_MANUAL_REVIEW  -> admin decides

              MANUAL:
                Upload -> PENDING_MANUAL_REVIEW -> admin decides ->
                  APPROVED -> Payment created -> PAYMENT_APPROVED notification
                  REJECTED                   -> PAYMENT_REJECTED notification

              AI_ASSISTED:
                Upload -> PENDING_ANALYSIS -> AI analyzes ->
                  isValid=true  -> PENDING_MANUAL_REVIEW -> admin decides ->
                                     APPROVED -> Payment created -> PAYMENT_APPROVED notification
                                     REJECTED               -> PAYMENT_REJECTED notification
                  isValid=false -> REJECTED               -> PAYMENT_REJECTED notification
                  AI fails      -> PENDING_MANUAL_REVIEW  -> admin decides

              The upload endpoint returns 202 immediately. All processing is async.
              ai_raw_response stores the full AI response for audit purposes.
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Primary key. UUID v4 generated by the application.
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: invoice_id
                  type: varchar(36)
                  remarks: Foreign key to invoice.
                  constraints:
                    nullable: false
                    foreignKeyName: fk_proof_invoice
                    references: invoice(id)
              - column:
                  name: file_path
                  type: varchar(1000)
                  remarks: >
                    Relative path to the uploaded proof file in the configured storage
                    directory. File is retained for audit even after rejection.
                  constraints:
                    nullable: false
              - column:
                  name: upload_token
                  type: varchar(500)
                  remarks: >
                    Short-lived JWT token that authorized the upload. Stored for audit.
                    Generated when the invoice notification email is sent.
                    A new token is issued when admin resends the notification link.
                  constraints:
                    nullable: false
              - column:
                  name: token_expires_at
                  type: datetime
                  remarks: >
                    Expiry datetime of the upload_token. Requests after this datetime
                    are rejected with 401. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: ai_extracted_value
                  type: decimal(15, 2)
                  remarks: >
                    Payment amount extracted from the proof by the AI model.
                    Null for MANUAL mode or until AI analysis completes.
                  constraints:
                    nullable: true
              - column:
                  name: final_value
                  type: decimal(15, 2)
                  remarks: >
                    The amount used when creating the Payment record.
                    Set from ai_extracted_value (AI_AUTO, AI_ASSISTED) or
                    from admin input during manual review (MANUAL, AI_ASSISTED).
                    Null until proof is approved.
                  constraints:
                    nullable: true
              - column:
                  name: requires_manual_review
                  type: boolean
                  defaultValueBoolean: false
                  remarks: >
                    True when this proof requires or required admin attention:
                    MANUAL mode (always), AI_ASSISTED with isValid=true, or AI failure.
                  constraints:
                    nullable: false
              - column:
                  name: ai_raw_response
                  type: text
                  remarks: >
                    Full raw JSON response from the AI model stored for audit.
                    Includes all fields: isValid, valueReceived, paymentDate,
                    receiverName, method, rejectionReason.
                    Null for MANUAL mode or until AI analysis runs.
                  constraints:
                    nullable: true
              - column:
                  name: status
                  type: varchar(50)
                  remarks: >
                    Processing status of this proof. One of:
                    PENDING_ANALYSIS      — uploaded, AI analysis not yet complete.
                                           Only for AI_AUTO and AI_ASSISTED modes.
                    PENDING_MANUAL_REVIEW — awaiting admin decision. Applies to:
                                           MANUAL (always), AI_ASSISTED (isValid=true),
                                           AI failure (any mode).
                    APPROVED              — proof accepted, payment record created.
                    REJECTED              — proof rejected. No payment created.
                                           Debtor can re-upload.
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  remarks: Timestamp when the proof was uploaded. Always stored in UTC.
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  remarks: Timestamp of the last update to this record. Always stored in UTC.
                  constraints:
                    nullable: false
