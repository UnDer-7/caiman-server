server:
  port: 8080

spring:
  application:
    name: caiman-server

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        # SQL Logging
        #        show_sql: true
        #        format_sql: true
        #        highlight_sql: true
        # Timezone configuration
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC

  datasource:
    url: ${CAIMAN_SERVER_DATABASE_JDBC_URL}
    username: ${CAIMAN_SERVER_DATABASE_USERNAME}
    password: ${CAIMAN_SERVER_DATABASE_PASSWORD}

  threads:
    virtual:
      enabled: true