server:
  port: ${caiman-server.server.port}

caiman-server:
  server:
    endpoints-prefix: ${CAIMAN_SERVER_ENDPOINTS_PREFIX:}
    port: ${CAIMAN_SERVER_PORT}
  logging:
    level: ${CAIMAN_SERVER_LOGGING_LEVEL}
    folder-path: ${CAIMAN_SERVER_LOGGING_FOLDER_PATH}
    format: ${CAIMAN_SERVER_LOGGING_FORMAT}
  project:
    name: "@project.name@"
    version: "@project.version@"
    description: "@project.description@"
  database:
    type: ${CAIMAN_SERVER_DATABASE_TYPE}
    url: ${CAIMAN_SERVER_DATABASE_JDBC_URL:}
    username: ${CAIMAN_SERVER_DATABASE_USERNAME:}
    password: ${CAIMAN_SERVER_DATABASE_PASSWORD:}
    sqlite-file: ${CAIMAN_SERVER_DATABASE_SQLITE_FILE:}
  open-api:
    api-docs:
      path: ${CAIMAN_SERVER_OPEN_API_API_DOCS_PATH}
      enabled: ${CAIMAN_SERVER_OPEN_API_API_DOCS_ENABLE}
    swagger-ui:
      path: ${CAIMAN_SERVER_OPEN_API_SWAGGER_UI_REDIRECT_PATH}
      enabled: ${CAIMAN_SERVER_OPEN_API_SWAGGER_UI_ENABLE}
    application:
      contact:
        name: ToDo-put-name #ToDo: Put real name
        url: https://google.com #ToDo: Put real site
        email: admin@admin.com #ToDo: Put real email
      documentation:
        url: https://google.com #ToDo: Put real site
        description: ToDo-put-documentation-description #ToDo: Put real doc

spring:
  application:
    name: ${caiman-server.project.name}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        # SQL Logging
        #        show_sql: true
        #        format_sql: true
        #        highlight_sql: true
        # Timezone configuration
        jdbc:
          time_zone: UTC
        # Disable ByteBuddy runtime bytecode generation (incompatible with GraalVM native image).
        # With native image, entity enhancement is done at build time by hibernate-graalvm.
        bytecode:
          provider: none

  jackson:
    time-zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: ${caiman-server.open-api.api-docs.path}
    resolve-schema-properties: true
    enabled: ${caiman-server.open-api.api-docs.enabled}
  override-with-generic-response: false
  swagger-ui:
    path: ${caiman-server.open-api.swagger-ui.path}
    enabled: ${caiman-server.open-api.swagger-ui.enabled}
  show-actuator: true

management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: always
  health:
    defaults:
      enabled: false
    db:
      enabled: true
    ping:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
