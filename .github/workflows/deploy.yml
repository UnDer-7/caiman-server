name: Deploy

on:
  push:
    branches:
      - main

jobs:
  quality-and-security:
    name: Code Quality and Security Analysis
    runs-on: ubuntu-26.04

    permissions:
      contents: read
      actions: write  # Upload SBOM artifact for tag-and-release job

    steps:
      - name: Checkout code
        # v7.0.0 - Repo: https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Setup GraalVM 25 (Oracle)
        uses: ./.github/actions/setup-graalvm
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Run tests and generate coverage report
        run: just test-coverage

      - name: Get date for Grype DB cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Cache Grype vulnerability DB
        uses: ./.github/actions/cache
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ vars.GRYPE_VERSION }}-${{ steps.date.outputs.date }}
          restore-keys: |
            grype-db-${{ vars.GRYPE_VERSION }}-

      - name: Install cosign
        uses: ./.github/actions/install-cosign
        with:
          cosign-version: ${{ vars.COSIGN_VERSION }}

      - name: Setup Anchore tools (Syft + Grype)
        uses: ./.github/actions/setup-anchore-tools
        with:
          syft-version: ${{ vars.SYFT_VERSION }}
          grype-version: ${{ vars.GRYPE_VERSION }}

      - name: Scan dependencies and workflows
        run: just security-scan-deps

      - name: Upload SBOM for release
        uses: ./.github/actions/upload-artifact
        with:
          name: sbom
          path: sbom.json
          retention-days: '1'

      - name: Publish SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: just sonar

  tag-and-release:
    name: Tag and Release
    runs-on: ubuntu-26.04
    needs: quality-and-security

    permissions:
      contents: write
      id-token: write  # Sigstore OIDC keyless signing

    outputs:
      version: ${{ steps.project-version.outputs.version }}

    steps:
      - name: Checkout code
        # v7.0.0 - Repo: https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup GraalVM 25 (Oracle)
        uses: ./.github/actions/setup-graalvm
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GraalVM installation
        run: |
          echo "GRAALVM_HOME: $GRAALVM_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          java -version

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Get current project version
        id: project-version
        run: |
          VERSION=$(just version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current project version: $VERSION"

      - name: Check if tag already exists
        id: check-tag
        run: |
          VERSION="${{ steps.project-version.outputs.version }}"

          if git ls-remote --tags origin | grep -q "refs/tags/$VERSION$"; then
            echo "::error::Tag $VERSION already exists in the repository!"
            echo ""
            echo "❌ A release for version $VERSION has already been created."
            echo ""
            echo "💡 This should not happen if the pull request pipeline is working correctly."
            echo "   The version validation should have prevented this."
            echo ""
            echo "Possible causes:"
            echo "  1. The tag was created manually"
            echo "  2. A previous deploy workflow run already created this tag"
            echo "  3. The pull request pipeline was bypassed"
            exit 1
          fi

          echo "✅ Tag $VERSION does not exist, proceeding with release"

      - name: Build GraalVM native image and JAR
        run: just build-artifacts

      - name: Find build artifacts
        id: artifacts
        run: |
          JAR_FILE=$(find caiman-app/build/libs -name "*.jar" -type f | head -n 1)
          NATIVE_FILE="caiman-app/build/native/nativeCompile/caiman-app"

          if [ -z "$JAR_FILE" ]; then
            echo "::error::JAR file not found in caiman-app/build/libs/"
            exit 1
          fi

          if [ ! -f "$NATIVE_FILE" ]; then
            echo "::error::Native binary not found at $NATIVE_FILE"
            exit 1
          fi

          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "native_file=$NATIVE_FILE" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR_FILE"
          echo "Found native binary: $NATIVE_FILE"

      - name: Download SBOM from security scan
        uses: ./.github/actions/download-artifact
        with:
          name: sbom
          path: '.'

      - name: Set SBOM path output
        id: sbom
        run: echo "sbom_file=sbom.json" >> $GITHUB_OUTPUT

      - name: Install cosign
        uses: ./.github/actions/install-cosign
        with:
          cosign-version: ${{ vars.COSIGN_VERSION }}

      - name: Sign release artifacts
        id: sign
        run: |
          JAR_FILE="${{ steps.artifacts.outputs.jar_file }}"
          NATIVE_FILE="${{ steps.artifacts.outputs.native_file }}"
          SBOM_FILE="${{ steps.sbom.outputs.sbom_file }}"

          cosign sign-blob --yes --output-signature "${JAR_FILE}.sig" "${JAR_FILE}"
          cosign sign-blob --yes --output-signature "${NATIVE_FILE}.sig" "${NATIVE_FILE}"
          cosign sign-blob --yes --output-signature "${SBOM_FILE}.sig" "${SBOM_FILE}"

          echo "jar_sig=${JAR_FILE}.sig" >> $GITHUB_OUTPUT
          echo "native_sig=${NATIVE_FILE}.sig" >> $GITHUB_OUTPUT
          echo "sbom_sig=${SBOM_FILE}.sig" >> $GITHUB_OUTPUT

      - name: Extract CHANGELOG for current version
        id: changelog
        run: |
          VERSION="${{ steps.project-version.outputs.version }}"
          CHANGELOG_FILE="CHANGELOG.md"

          CHANGELOG_CONTENT=$(sed -n "/^## \[$VERSION\]/,/^## \[/p" "$CHANGELOG_FILE" | sed '$d')

          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT=$(sed -n "/^## \[$VERSION\]/,\$p" "$CHANGELOG_FILE")
          fi

          CHANGELOG_CONTENT=$(echo "$CHANGELOG_CONTENT" | tail -n +2)

          echo "$CHANGELOG_CONTENT" > changelog_body.txt
          echo "✅ Extracted CHANGELOG for version $VERSION"

      - name: Create Git tag
        run: |
          VERSION="${{ steps.project-version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          echo "✅ Created and pushed tag $VERSION"

      - name: Create GitHub Release
        uses: ./.github/actions/create-github-release
        with:
          tag-name: ${{ steps.project-version.outputs.version }}
          name: ${{ steps.project-version.outputs.version }}
          body-path: changelog_body.txt
          files: |
            ${{ steps.artifacts.outputs.jar_file }}
            ${{ steps.artifacts.outputs.native_file }}
            ${{ steps.sign.outputs.jar_sig }}
            ${{ steps.sign.outputs.native_sig }}
            ${{ steps.sbom.outputs.sbom_file }}
            ${{ steps.sign.outputs.sbom_sig }}
          draft: 'false'
          prerelease: 'false'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts for Docker
        uses: ./.github/actions/upload-artifact
        with:
          name: build-artifacts
          path: |
            caiman-app/build/libs/
            caiman-app/build/native/nativeCompile/
          retention-days: '1'

  deploy-image:
    name: Build and Push Docker Images
    runs-on: ubuntu-26.04
    needs: tag-and-release

    permissions:
      id-token: write  # Sigstore OIDC keyless attestation

    steps:
      - name: Checkout code
        # v7.0.0 - Repo: https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup GraalVM 25 (Oracle)
        uses: ./.github/actions/setup-graalvm
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Get project version
        id: project-version
        run: |
          VERSION=${{ needs.tag-and-release.outputs.version }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project version: $VERSION"

      - name: Download build artifacts
        uses: ./.github/actions/download-artifact
        with:
          name: build-artifacts
          path: '.'

      - name: Verify downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          JAR_FILE=$(find caiman-app/build/libs -name "*.jar" -type f | head -n 1)
          NATIVE_FILE="caiman-app/build/native/nativeCompile/caiman-app"

          if [ -z "$JAR_FILE" ]; then
            echo "::error::JAR file not found!"
            exit 1
          fi

          if [ ! -f "$NATIVE_FILE" ]; then
            echo "::error::Native binary not found!"
            exit 1
          fi

          chmod +x "$NATIVE_FILE"

          echo "✅ JAR file: $JAR_FILE"
          echo "✅ Native binary: $NATIVE_FILE"

      - name: Build JVM Docker image
        run: |
          echo "Building JVM Docker image..."
          just build-jar-docker
          echo "✅ JVM image built: under7/caiman-server:${{ steps.project-version.outputs.version }}-jvm"

      - name: Build native Docker image
        run: |
          echo "Building native Docker image..."
          just build-native-docker
          echo "✅ Native image built: under7/caiman-server:${{ steps.project-version.outputs.version }}-native"

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push JVM image to Docker Hub
        run: |
          IMAGE_NAME="under7/caiman-server:${{ steps.project-version.outputs.version }}-jvm"
          echo "Pushing $IMAGE_NAME..."
          docker push $IMAGE_NAME
          echo "✅ JVM image pushed successfully"

      - name: Push native image to Docker Hub
        run: |
          IMAGE_NAME="under7/caiman-server:${{ steps.project-version.outputs.version }}-native"
          echo "Pushing $IMAGE_NAME..."
          docker push $IMAGE_NAME
          echo "✅ Native image pushed successfully"

      - name: Tag and push latest images
        run: |
          VERSION="${{ steps.project-version.outputs.version }}"
          JVM_IMAGE="under7/caiman-server:${VERSION}-jvm"
          NATIVE_IMAGE="under7/caiman-server:${VERSION}-native"

          docker tag $JVM_IMAGE under7/caiman-server:latest-jvm
          docker push under7/caiman-server:latest-jvm
          echo "✅ Tagged and pushed under7/caiman-server:latest-jvm"

          docker tag $NATIVE_IMAGE under7/caiman-server:latest-native
          docker push under7/caiman-server:latest-native
          echo "✅ Tagged and pushed under7/caiman-server:latest-native"

          # latest points to native (smaller, faster startup)
          docker tag $NATIVE_IMAGE under7/caiman-server:latest
          docker push under7/caiman-server:latest
          echo "✅ Tagged and pushed under7/caiman-server:latest"

      - name: Install cosign
        uses: ./.github/actions/install-cosign
        with:
          cosign-version: ${{ vars.COSIGN_VERSION }}

      - name: Setup Anchore tools (Syft + Grype)
        uses: ./.github/actions/setup-anchore-tools
        with:
          syft-version: ${{ vars.SYFT_VERSION }}
          grype-version: ${{ vars.GRYPE_VERSION }}

      - name: Attest images
        run: |
          VERSION="${{ steps.project-version.outputs.version }}"
          syft attest --output cyclonedx-json under7/caiman-server:${VERSION}-jvm
          syft attest --output cyclonedx-json under7/caiman-server:${VERSION}-native
