name: Weekly Security Scan

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

defaults:
  run:
    shell: bash

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        # v7.0.0 - Repo: https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup GraalVM 25 (Oracle)
        uses: ./.github/actions/setup-graalvm
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Get date for Grype DB cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Cache Grype vulnerability DB
        uses: ./.github/actions/cache
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ vars.GRYPE_VERSION }}-${{ steps.date.outputs.date }}
          restore-keys: |
            grype-db-${{ vars.GRYPE_VERSION }}-

      - name: Install cosign
        uses: ./.github/actions/install-cosign
        with:
          cosign-version: ${{ vars.COSIGN_VERSION }}

      - name: Setup Anchore tools (Syft + Grype)
        uses: ./.github/actions/setup-anchore-tools
        with:
          syft-version: ${{ vars.SYFT_VERSION }}
          grype-version: ${{ vars.GRYPE_VERSION }}

      - name: Scan dependencies and workflows
        id: scan
        continue-on-error: true
        run: |
          set -o pipefail
          just security-scan-deps 2>&1 | tee scan-output.txt

      - name: Build alert email
        if: steps.scan.outcome == 'failure'
        run: bash .github/scripts/build-security-alert-email.sh "Vulnerabilities Detected"

      - name: Create or update security issue
        if: steps.scan.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/create-or-update-security-issue.sh "Caiman :: Security: Dependency Vulnerabilities Detected" "Vulnerabilities Detected"

      - name: Send security alert email
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/send-mail
        with:
          server_address: ${{ vars.SMTP_SERVER }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: ${{ vars.SMTP_SECURE }}
          username: ${{ vars.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Caiman] Security Scan Failed - Vulnerabilities Detected"
          from: ${{ vars.SMTP_FROM }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          body: file://email-body.txt
          html_body: file://email-body.html

      - name: Fail job after notification
        if: steps.scan.outcome == 'failure'
        run: exit 1

  base-image-scan:
    name: Base Image Vulnerability Scan
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout code
        # v7.0.0 - Repo: https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install just
        uses: ./.github/actions/install-just

      - name: Get date for Grype DB cache key
        id: date
        run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Cache Grype vulnerability DB
        uses: ./.github/actions/cache
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ vars.GRYPE_VERSION }}-${{ steps.date.outputs.date }}
          restore-keys: |
            grype-db-${{ vars.GRYPE_VERSION }}-

      - name: Install cosign
        uses: ./.github/actions/install-cosign
        with:
          cosign-version: ${{ vars.COSIGN_VERSION }}

      - name: Setup Anchore tools (Grype)
        uses: ./.github/actions/setup-anchore-tools
        with:
          syft-version: ${{ vars.SYFT_VERSION }}
          grype-version: ${{ vars.GRYPE_VERSION }}

      - name: Scan base images
        id: scan
        continue-on-error: true
        run: |
          set -o pipefail
          just security-scan-base-images 2>&1 | tee scan-output.txt

      - name: Build alert email
        if: steps.scan.outcome == 'failure'
        run: bash .github/scripts/build-security-alert-email.sh "Base Image Vulnerabilities Detected"

      - name: Create or update security issue
        if: steps.scan.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash .github/scripts/create-or-update-security-issue.sh "Caiman :: Security: Base Image Vulnerabilities Detected" "Base Image Vulnerabilities Detected"

      - name: Send security alert email
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/send-mail
        with:
          server_address: ${{ vars.SMTP_SERVER }}
          server_port: ${{ vars.SMTP_PORT }}
          secure: ${{ vars.SMTP_SECURE }}
          username: ${{ vars.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Caiman] Security Scan Failed - Base Image Vulnerabilities Detected"
          from: ${{ vars.SMTP_FROM }}
          to: ${{ vars.NOTIFICATION_EMAIL }}
          body: file://email-body.txt
          html_body: file://email-body.html

      - name: Fail job after notification
        if: steps.scan.outcome == 'failure'
        run: exit 1
