name: Upload Artifact
description: Wraps actions/upload-artifact with a pinned SHA.

inputs:
  name:
    required: true
    description: Artifact name
  path:
    required: true
    description: Files or directories to upload (glob patterns, newline-separated)
  retention-days:
    required: false
    default: '1'
    description: Number of days to retain the artifact

runs:
  using: composite
  steps:
    # v5.0.0 - Repo: https://github.com/actions/upload-artifact
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
        retention-days: ${{ inputs.retention-days }}
