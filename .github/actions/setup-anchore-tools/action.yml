name: Setup Anchore Tools
description: >
  Downloads Syft and Grype from GitHub releases, verifies cosign signature and
  SHA-256 checksum, then caches the verified binaries. Requires cosign to be
  installed before this action runs.

inputs:
  syft-version:
    required: true
    description: Syft version to install (e.g. v1.45.1)
  grype-version:
    required: true
    description: Grype version to install (e.g. v0.114.0)

runs:
  using: composite
  steps:
    - name: Validate cosign is available
      shell: bash
      run: |
        if ! command -v cosign &>/dev/null; then
          echo "::error::cosign not found. Add the following step before calling setup-anchore-tools:%0A    - uses: sigstore/cosign-installer@<sha>  # pin to a commit SHA"
          exit 1
        fi

    - name: Restore Anchore tools cache
      id: cache-anchore
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
      with:
        path: ~/.anchore/bin
        key: anchore-tools-syft-${{ inputs.syft-version }}-grype-${{ inputs.grype-version }}-${{ runner.os }}

    - name: Download and verify Syft
      if: steps.cache-anchore.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p "$HOME/.anchore/bin"

        SYFT_VERSION="${{ inputs.syft-version }}"
        SYFT_BARE="${SYFT_VERSION#v}"
        SYFT_BASE="https://github.com/anchore/syft/releases/download/${SYFT_VERSION}"

        curl -fsSL "${SYFT_BASE}/syft_${SYFT_BARE}_linux_amd64.tar.gz"    -o syft.tar.gz
        curl -fsSL "${SYFT_BASE}/syft_${SYFT_BARE}_checksums.txt"          -o syft_checksums.txt
        curl -fsSL "${SYFT_BASE}/syft_${SYFT_BARE}_checksums.txt.pem"      -o syft_checksums.txt.pem
        curl -fsSL "${SYFT_BASE}/syft_${SYFT_BARE}_checksums.txt.sig"      -o syft_checksums.txt.sig

        cosign verify-blob syft_checksums.txt \
          --certificate syft_checksums.txt.pem \
          --signature   syft_checksums.txt.sig \
          --certificate-identity-regexp 'https://github\.com/anchore/syft/\.github/workflows/.+' \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

        sha256sum --ignore-missing -c syft_checksums.txt

        tar -xzf syft.tar.gz syft
        mv syft "$HOME/.anchore/bin/syft"
        rm -f syft.tar.gz syft_checksums.txt syft_checksums.txt.pem syft_checksums.txt.sig

    - name: Download and verify Grype
      if: steps.cache-anchore.outputs.cache-hit != 'true'
      shell: bash
      run: |
        GRYPE_VERSION="${{ inputs.grype-version }}"
        GRYPE_BARE="${GRYPE_VERSION#v}"
        GRYPE_BASE="https://github.com/anchore/grype/releases/download/${GRYPE_VERSION}"

        curl -fsSL "${GRYPE_BASE}/grype_${GRYPE_BARE}_linux_amd64.tar.gz"  -o grype.tar.gz
        curl -fsSL "${GRYPE_BASE}/grype_${GRYPE_BARE}_checksums.txt"        -o grype_checksums.txt
        curl -fsSL "${GRYPE_BASE}/grype_${GRYPE_BARE}_checksums.txt.pem"    -o grype_checksums.txt.pem
        curl -fsSL "${GRYPE_BASE}/grype_${GRYPE_BARE}_checksums.txt.sig"    -o grype_checksums.txt.sig

        cosign verify-blob grype_checksums.txt \
          --certificate grype_checksums.txt.pem \
          --signature   grype_checksums.txt.sig \
          --certificate-identity-regexp 'https://github\.com/anchore/grype/\.github/workflows/.+' \
          --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

        sha256sum --ignore-missing -c grype_checksums.txt

        tar -xzf grype.tar.gz grype
        mv grype "$HOME/.anchore/bin/grype"
        rm -f grype.tar.gz grype_checksums.txt grype_checksums.txt.pem grype_checksums.txt.sig

    - name: Add Anchore tools to PATH
      shell: bash
      run: echo "$HOME/.anchore/bin" >> $GITHUB_PATH
