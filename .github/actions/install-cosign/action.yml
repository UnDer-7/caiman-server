name: Install cosign
description: Wraps sigstore/cosign-installer with a pinned SHA.

inputs:
  cosign-version:
    required: true
    description: cosign release version (e.g. v2.5.2)

runs:
  using: composite
  steps:
    # v4.1.2 - Repo: https://github.com/sigstore/cosign-installer
    - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
      with:
        cosign-release: ${{ inputs.cosign-version }}
