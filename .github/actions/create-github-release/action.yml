name: Create GitHub Release
description: Wraps softprops/action-gh-release with a pinned SHA.

inputs:
  tag-name:
    required: true
    description: Release tag
  name:
    required: true
    description: Release title
  body-path:
    required: true
    description: Path to file containing release body
  files:
    required: true
    description: Release assets (glob patterns, newline-separated)
  draft:
    required: false
    default: 'false'
    description: Publish as draft release
  prerelease:
    required: false
    default: 'false'
    description: Mark release as pre-release
  github-token:
    required: true
    description: GitHub token for creating the release

runs:
  using: composite
  steps:
    # v3.0.1 - Repo: https://github.com/softprops/action-gh-release
    - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b
      with:
        tag_name: ${{ inputs.tag-name }}
        name: ${{ inputs.name }}
        body_path: ${{ inputs.body-path }}
        files: ${{ inputs.files }}
        draft: ${{ inputs.draft }}
        prerelease: ${{ inputs.prerelease }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
