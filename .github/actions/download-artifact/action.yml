name: Download Artifact
description: Wraps actions/download-artifact with a pinned SHA.

inputs:
  name:
    required: true
    description: Artifact name to download
  path:
    required: false
    default: '.'
    description: Destination directory

runs:
  using: composite
  steps:
    # v8.0.1 - Repo: https://github.com/actions/download-artifact
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
      with:
        name: ${{ inputs.name }}
        path: ${{ inputs.path }}
