name: Setup GraalVM
description: Wraps graalvm/setup-graalvm with a pinned SHA. Always installs Java 25 Oracle GraalVM with Gradle cache.

inputs:
  github-token:
    required: true
    description: GitHub token for GraalVM download rate limiting

runs:
  using: composite
  steps:
    # v1.5.6 - Repo: https://github.com/graalvm/setup-graalvm
    - uses: graalvm/setup-graalvm@6f3fa030c4b8f77c1f554a860f593a654538fa38
      with:
        java-version: '25'
        distribution: 'graalvm'
        github-token: ${{ inputs.github-token }}
        cache: 'gradle'
