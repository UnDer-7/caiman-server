services:
  caiman-server:
#    image: under7/caiman-server:latest
    image: under7/caiman-server:v0.0.1-jvm
    container_name: caiman-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      CAIMAN_SERVER_PORT: 8080
      CAIMAN_SERVER_ENDPOINTS_PREFIX: /api
      CAIMAN_SERVER_LOGGING_LEVEL: INFO
      CAIMAN_SERVER_LOGGING_FOLDER_PATH: /app/logs
      CAIMAN_SERVER_LOGGING_FORMAT: UNSTRUCTURED
      CAIMAN_SERVER_DATABASE_TYPE: SQLITE
      CAIMAN_SERVER_DATABASE_SQLITE_FILE: /app/data/database.db
      CAIMAN_SERVER_OPEN_API_API_DOCS_PATH: /api-docs
      CAIMAN_SERVER_OPEN_API_API_DOCS_ENABLE: "true"
      CAIMAN_SERVER_OPEN_API_SWAGGER_UI_REDIRECT_PATH: /
      CAIMAN_SERVER_OPEN_API_SWAGGER_UI_ENABLE: "true"
    mem_limit: 384m
    volumes:
      - caiman_data:/app/data
      - caiman_logs:/app/logs

volumes:
  caiman_data:
    name: caiman_data
  caiman_logs:
    name: caiman_logs
